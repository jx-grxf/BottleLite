<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9CC4FF"/>
      <stop offset="0.5" stop-color="#6BA6FF"/>
      <stop offset="1" stop-color="#4E8BF5"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#243149"/>
      <stop offset="0.5" stop-color="#121A2B"/>
      <stop offset="1" stop-color="#080C16"/>
    </linearGradient>
    <linearGradient id="bottleSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.35" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A9CCFF"/>
      <stop offset="1" stop-color="#7FB0F4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0A1830" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect x="40" y="40" width="944" height="944" rx="232" ry="232" fill="url(#bg)"/>
  <rect x="40" y="40" width="944" height="944" rx="232" ry="232" fill="url(#bgGlow)"/>

  <!-- Bottle -->
  <g filter="url(#soft)">
    <path fill="url(#bottle)" stroke="#05080F" stroke-width="6" d="
      M 478 158
      a 14 14 0 0 1 14 -14 h 40 a 14 14 0 0 1 14 14
      v 150
      c 0 46 16 72 36 100
      c 24 34 36 68 36 116
      v 270
      a 44 44 0 0 1 -44 44
      h -140
      a 44 44 0 0 1 -44 -44
      v -270
      c 0 -48 12 -82 36 -116
      c 20 -28 36 -54 36 -100
      z"/>
    <!-- left sheen -->
    <path fill="url(#bottleSheen)" d="
      M 478 158
      a 14 14 0 0 1 14 -14 h 12
      v 120
      c 0 50 -12 78 -32 106
      c -22 32 -34 68 -34 116
      v 270
      h -14
      v -270
      c 0 -48 12 -82 36 -116
      c 20 -28 36 -54 36 -100
      z" opacity="0.5"/>
  </g>

  <!-- Cork -->
  <rect x="486" y="120" width="52" height="30" rx="9" fill="#0A1020" stroke="#05080F" stroke-width="6"/>

  <!-- Label -->
  <rect x="446" y="468" width="132" height="206" rx="24" fill="url(#label)" stroke="#5E8FD6" stroke-width="5"/>

