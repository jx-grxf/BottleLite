name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing signed tag version without the leading v"
        required: true
        type: string
      build:
        description: "Sparkle build number; leave empty to use the GitHub run number"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
      channel: ${{ steps.version.outputs.channel }}
      commit: ${{ steps.tag.outputs.commit }}
    steps:
      - name: Checkout history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve release identity
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUILD: ${{ inputs.build }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="v${INPUT_VERSION#v}"
          fi
          version="${tag#v}"
          build="${INPUT_BUILD:-$GITHUB_RUN_NUMBER}"

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]] || {
            echo "error: unsupported release version '$version'" >&2
            exit 1
          }
          [[ "$build" =~ ^[1-9][0-9]*$ ]] || {
            echo "error: build number must be a positive integer" >&2
            exit 1
          }

          if [[ "$version" == *-beta.* ]]; then
            channel="beta"
          else
            channel="stable"
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "build=$build"
            echo "channel=$channel"
          } >>"$GITHUB_OUTPUT"

      - name: Verify signed annotated tag on main
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}")"
          [[ "$(jq -r '.object.type' <<<"$ref_json")" == "tag" ]] || {
            echo "error: $RELEASE_TAG must be an annotated tag" >&2
            exit 1
          }
          tag_object="$(jq -r '.object.sha' <<<"$ref_json")"
          tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object}")"
          [[ "$(jq -r '.verification.verified' <<<"$tag_json")" == "true" ]] || {
            echo "error: GitHub did not verify the signature on $RELEASE_TAG" >&2
            exit 1
          }
          commit="$(jq -r '.object.sha' <<<"$tag_json")"
          git fetch --force origin main "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          git merge-base --is-ancestor "$commit" origin/main || {
            echo "error: tagged commit is not reachable from origin/main" >&2
            exit 1
          }
          git checkout --detach "$commit"
          echo "commit=$commit" >>"$GITHUB_OUTPUT"

      - name: Verify release metadata
        env:
          BOTTLELITE_VERSION: ${{ steps.version.outputs.version }}
          BOTTLELITE_BUILD: ${{ steps.version.outputs.build }}
          BOTTLELITE_UPDATE_CHANNEL: ${{ steps.version.outputs.channel }}
          BOTTLELITE_RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: ./script/verify_release_metadata.sh

  build-release:
    name: Build and publish release
    needs: preflight
    # Build against the macOS 26 SDK so the shipped app adopts the Liquid Glass
    # appearance on Tahoe. Deployment target stays macOS 14 (see Package.swift).
    runs-on: macos-26
    timeout-minutes: 45
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout signed tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.preflight.outputs.tag }}
          fetch-depth: 0

      - name: Show toolchain
        run: |
          sw_vers
          swift --version

      - name: Install tools
        run: brew install swift-format shellcheck create-dmg

      - name: Lint and test tagged source
        run: |
          make lint
          make test

      - name: Build DMG
        env:
          BOTTLELITE_VERSION: ${{ needs.preflight.outputs.version }}
          BOTTLELITE_BUILD: ${{ needs.preflight.outputs.build }}
          BOTTLELITE_UPDATE_CHANNEL: ${{ needs.preflight.outputs.channel }}
          BOTTLELITE_SPARKLE_PUBLIC_KEY: ${{ vars.BOTTLELITE_SPARKLE_PUBLIC_KEY }}
          BOTTLELITE_SIGN_IDENTITY: ${{ secrets.BOTTLELITE_SIGN_IDENTITY }}
          BOTTLELITE_REQUIRE_STYLED_DMG: "true"
        run: ./script/package_dmg.sh

      - name: Build Sparkle assets
        env:
          BOTTLELITE_VERSION: ${{ needs.preflight.outputs.version }}
          BOTTLELITE_BUILD: ${{ needs.preflight.outputs.build }}
          BOTTLELITE_UPDATE_CHANNEL: ${{ needs.preflight.outputs.channel }}
          BOTTLELITE_SPARKLE_PRIVATE_KEY: ${{ secrets.BOTTLELITE_SPARKLE_PRIVATE_KEY }}
          BOTTLELITE_SPARKLE_DOWNLOAD_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ needs.preflight.outputs.tag }}
        run: ./script/create_sparkle_assets.sh

      - name: Notarize DMG
        env:
          BOTTLELITE_VERSION: ${{ needs.preflight.outputs.version }}
          BOTTLELITE_NOTARY_ENABLED: ${{ secrets.BOTTLELITE_NOTARY_ENABLED }}
          BOTTLELITE_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.BOTTLELITE_NOTARY_KEYCHAIN_PROFILE }}
          BOTTLELITE_NOTARY_APPLE_ID: ${{ secrets.BOTTLELITE_NOTARY_APPLE_ID }}
          BOTTLELITE_NOTARY_TEAM_ID: ${{ secrets.BOTTLELITE_NOTARY_TEAM_ID }}
          BOTTLELITE_NOTARY_PASSWORD: ${{ secrets.BOTTLELITE_NOTARY_PASSWORD }}
        run: ./script/notarize_release.sh

      - name: Verify release artifacts
        env:
          BOTTLELITE_VERSION: ${{ needs.preflight.outputs.version }}
          BOTTLELITE_BUILD: ${{ needs.preflight.outputs.build }}
          BOTTLELITE_UPDATE_CHANNEL: ${{ needs.preflight.outputs.channel }}
          BOTTLELITE_RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          BOTTLELITE_NOTARY_ENABLED: ${{ secrets.BOTTLELITE_NOTARY_ENABLED }}
        run: ./script/verify_release_artifacts.sh

      - name: Extract current release notes
        run: |
          ./script/extract_release_notes.sh \
            "${{ needs.preflight.outputs.version }}" \
            dist/RELEASE_NOTES.md

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/BottleLite-*.dmg
            dist/sparkle/BottleLite-*.zip
            dist/sparkle/appcast.xml
            dist/SHA256SUMS

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: BottleLite-${{ needs.preflight.outputs.version }}
          path: |
            dist/BottleLite-${{ needs.preflight.outputs.version }}.dmg
            dist/sparkle/BottleLite-${{ needs.preflight.outputs.version }}.zip
            dist/sparkle/appcast.xml
            dist/SHA256SUMS
            dist/RELEASE_NOTES.md
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
          RELEASE_CHANNEL: ${{ needs.preflight.outputs.channel }}
          RELEASE_COMMIT: ${{ needs.preflight.outputs.commit }}
        run: |
          set -euo pipefail
          assets=(
            "dist/BottleLite-${RELEASE_VERSION}.dmg#BottleLite-${RELEASE_VERSION}.dmg"
            "dist/sparkle/BottleLite-${RELEASE_VERSION}.zip#BottleLite-${RELEASE_VERSION}.zip"
            "dist/sparkle/appcast.xml#appcast.xml"
            "dist/SHA256SUMS#SHA256SUMS"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            if [[ "$RELEASE_CHANNEL" == "beta" ]]; then
              gh release edit "$RELEASE_TAG" --target "$RELEASE_COMMIT" --title "BottleLite ${RELEASE_VERSION}" --notes-file dist/RELEASE_NOTES.md --prerelease --latest=false
            else
              gh release edit "$RELEASE_TAG" --target "$RELEASE_COMMIT" --title "BottleLite ${RELEASE_VERSION}" --notes-file dist/RELEASE_NOTES.md --prerelease=false --latest
            fi
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          elif [[ "$RELEASE_CHANNEL" == "beta" ]]; then
            gh release create "$RELEASE_TAG" "${assets[@]}" --verify-tag --target "$RELEASE_COMMIT" --title "BottleLite ${RELEASE_VERSION}" --notes-file dist/RELEASE_NOTES.md --prerelease
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --verify-tag --target "$RELEASE_COMMIT" --title "BottleLite ${RELEASE_VERSION}" --notes-file dist/RELEASE_NOTES.md --latest
          fi

      - name: Verify published release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          release_json="$(gh release view "$RELEASE_TAG" --json assets,isDraft,url)"
          [[ "$(jq -r '.isDraft' <<<"$release_json")" == "false" ]]
          for name in "BottleLite-${RELEASE_VERSION}.dmg" "BottleLite-${RELEASE_VERSION}.zip" appcast.xml SHA256SUMS; do
            size="$(jq -r --arg name "$name" '.assets[] | select(.name == $name) | .size' <<<"$release_json")"
            [[ "$size" =~ ^[1-9][0-9]*$ ]] || {
              echo "error: published asset $name is missing or empty" >&2
              exit 1
            }
          done
          echo "Published $(jq -r '.url' <<<"$release_json")"

      - name: Publish beta appcast feed
        if: needs.preflight.outputs.channel == 'beta'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.preflight.outputs.commit }}
        run: |
          set -euo pipefail
          if gh release view beta >/dev/null 2>&1; then
            gh release edit beta --target "$RELEASE_COMMIT" --prerelease --latest=false --title "BottleLite Beta Feed"
            gh release upload beta "dist/sparkle/appcast.xml#appcast.xml" --clobber
          else
            gh release create beta "dist/sparkle/appcast.xml#appcast.xml" \
              --target "$RELEASE_COMMIT" \
              --title "BottleLite Beta Feed" \
              --notes "Moving Sparkle beta appcast feed. Install beta builds from versioned prereleases." \
              --prerelease
          fi

      - name: Trigger website rebuild
        env:
          WEBSITE_DEPLOY_HOOK_URL: ${{ secrets.WEBSITE_DEPLOY_HOOK_URL }}
          WEBSITE_DEPLOY_HOOK: ${{ secrets.WEBSITE_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          deploy_hook="${WEBSITE_DEPLOY_HOOK_URL:-${WEBSITE_DEPLOY_HOOK:-}}"
          if [[ -z "$deploy_hook" ]]; then
            echo "WEBSITE_DEPLOY_HOOK_URL secret is missing; skipping website rebuild."
            exit 0
          fi

          curl --fail --silent --show-error --request POST "$deploy_hook"
